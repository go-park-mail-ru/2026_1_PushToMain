basePath: /
definitions:
  handler.EmailResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      header:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      sender_id:
        type: integer
    type: object
  handler.GetEmailResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      header:
        type: string
      id:
        type: integer
      sender_id:
        type: integer
    type: object
  response.ErrorResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8087
info:
  contact: {}
  title: Smail API
  version: "1.0"
paths:
  /api/v1/emails:
    get:
      description: Возвращает список писем, в которых авторизованный пользователь
        указан получателем
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.EmailResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Получить письма пользователя
      tags:
      - emails
  /api/v1/emails/{id}:
    get:
      description: Возвращает детальную информацию о письме
      parameters:
      - description: ID письма
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.GetEmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Получить письмо по ID
      tags:
      - emails
  /api/v1/emails/{id}/read:
    put:
      consumes:
      - application/json
      description: Помечает указанное письмо как прочитанное.
      parameters:
      - description: ID письма
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Отметить письмо как прочитанное
      tags:
      - emails
  /api/v1/forward:
    post:
      description: Пересылает письмо получаетлям, которых указал пользователь
      produces:
      - application/json
      responses:
        "200":
          description: Success
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Переслать письмо
      tags:
      - emails
  /api/v1/send:
    post:
      description: Отправляет письмо получаетлям, которых указал пользователь
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Отправить письмо
      tags:
      - emails
swagger: "2.0"
