basePath: /
definitions:
  handler.AddEmailsInFolderRequest:
    properties:
      emails_id:
        items:
          type: integer
        type: array
    type: object
  handler.ChangeFolderNameRequest:
    properties:
      folder_name:
        type: string
    type: object
  handler.CreateNewFolderRequest:
    properties:
      folder_name:
        type: string
    type: object
  handler.CreateNewFolderResponse:
    properties:
      folder_id:
        type: integer
    type: object
  handler.DeleteEmailRequest:
    properties:
      email_id:
        type: integer
    type: object
  handler.DeleteEmailsFromFolderRequest:
    properties:
      emails_id:
        items:
          type: integer
        type: array
    type: object
  handler.GetEmailResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      header:
        type: string
      id:
        type: integer
      receiver_list:
        items:
          type: string
        type: array
      sender_email:
        type: string
      sender_id:
        type: integer
      sender_image_path:
        type: string
      sender_name:
        type: string
      sender_surname:
        type: string
    type: object
  handler.GetEmailsFromFolderResponse:
    properties:
      emails:
        items:
          $ref: '#/definitions/internal_app_folder_delivery_http.EmailResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
      unread_count:
        type: integer
    type: object
  handler.GetEmailsResponse:
    properties:
      emails:
        items:
          $ref: '#/definitions/internal_app_email_delivery_http.EmailResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
      unread_count:
        type: integer
    type: object
  handler.MarkEmailsAsReadRequest:
    properties:
      email_ids:
        items:
          type: integer
        type: array
    type: object
  http.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  http.SignUpRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      surname:
        type: string
    type: object
  http.UpdateProfileRequest:
    properties:
      name:
        type: string
      surname:
        type: string
    type: object
  internal_app_email_delivery_http.EmailResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      header:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      receiver_list:
        items:
          type: string
        type: array
      sender_email:
        type: string
      sender_name:
        type: string
      sender_surname:
        type: string
    type: object
  internal_app_folder_delivery_http.EmailResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      header:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      receiver_list:
        items:
          type: string
        type: array
      sender_email:
        type: string
      sender_name:
        type: string
      sender_surname:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8087
info:
  contact: {}
  title: Smail API
  version: "1.0"
paths:
  /api/v1/auth/logout:
    post:
      description: Завершает сессию пользователя, сбрасывает сессионную куку
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Выход
      tags:
      - auth
  /api/v1/auth/signin:
    post:
      consumes:
      - application/json
      description: Аутентифицирует пользователя и устанавливает сессионную куку
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/http.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Вход
      tags:
      - auth
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и устанавливает сессионную куку
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/http.SignUpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Регистрация
      tags:
      - auth
  /api/v1/emails:
    get:
      description: Возвращает список писем, в которых авторизованный пользователь
        указан получателем
      parameters:
      - description: 'Количество записей на странице (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Смещение для пагинации (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.GetEmailsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Получить письма пользователя
      tags:
      - emails
  /api/v1/emails/{id}:
    get:
      description: Возвращает детальную информацию о письме
      parameters:
      - description: ID письма
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.GetEmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Получить письмо по ID
      tags:
      - emails
  /api/v1/emails/{id}/read:
    put:
      consumes:
      - application/json
      description: Помечает указанное письмо как прочитанное.
      parameters:
