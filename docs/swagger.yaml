basePath: /
definitions:
  handler.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.SignUpRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      surname:
        type: string
    type: object
  models.Email:
    properties:
      body:
        type: string
      email-id:
        type: string
      from:
        type: string
      header:
        type: string
      to:
        items:
          type: string
        type: array
    type: object
  response.ErrorResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8087
info:
  contact: {}
  title: Smail API
  version: "1.0"
paths:
  /auth/logout:
    post:
      description: Завершает сессию пользователя, сбрасывает сессионную куку
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Выход
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Аутентифицирует пользователя и устанавливает сессионную куку
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Вход
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и устанавливает сессионную куку
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.SignUpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Регистрация
      tags:
      - auth
  /emails:
    get:
      description: Возвращает список писем, в которых авторизованный пользователь
        указан получателем
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Email'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить письма пользователя
      tags:
      - emails
swagger: "2.0"
