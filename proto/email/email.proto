syntax = "proto3";

package email;

import "google/protobuf/timestamp.proto";

option go_package = "./proto/email";

service EmailService {
    rpc GetEmailById(GetEmailByIdRequest) returns (GetEmailByIdResponse);
    rpc CheckEmailAccess(CheckEmailAccessRequest) returns (CheckEmailAccessResponse);
    rpc GetEmailsByIds(GetEmailsByIdsRequest) returns (GetEmailsByIdsResponse);
}

message Email {
    int64 id = 1;
    int64 sender_id = 2;
    string header = 3;
    string body = 4;
    string created_at = 5;
}

message GetEmailByIdRequest {
    int64 email_id = 1;
    int64 user_id = 2;
}

message GetEmailByIdResponse {
    Email email = 1;
}

message CheckEmailAccessRequest {
    int64 email_id = 1;
    int64 user_id = 2;
}

message CheckEmailAccessResponse {
    bool has_access = 1;
}

message FolderEmail {
  int64 id = 1;

  string sender_email = 2;
  string sender_name = 3;
  string sender_surname = 4;

  repeated string receiver_list = 5;

  string header = 6;
  string body = 7;

  google.protobuf.Timestamp created_at = 8;

  bool is_read = 9;
}

message GetEmailsByIdsRequest {
  repeated int64 email_ids = 1;

  int64 user_id = 2;
}

message GetEmailsByIdsResponse {
  repeated FolderEmail emails = 1;

  int32 unread_count = 2;
}