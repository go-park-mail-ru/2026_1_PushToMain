global:
  scrape_interval: 15s
  external_labels:
    env: dev

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: "email-service"
    static_configs:
      - targets: ["email-service:8082"]

  - job_name: "folder-service"
    static_configs:
      - targets: ["folder-service:8083"]
