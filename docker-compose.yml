services:
  # =========================================
  # POSTGRES
  # =========================================
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DBNAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================
  # MINIO
  # =========================================
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9090:9090"
    command: server --console-address ":9090" /data
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================
  # USER SERVICE  (HTTP :8081 | gRPC :50051)
  # =========================================
  user-service:
    build:
      context: .
      dockerfile: microservices/user/Dockerfile
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "8081:8081"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # =========================================
  # EMAIL SERVICE  (HTTP :8082 | gRPC :50052)
  # =========================================
  email-service:
    build:
      context: .
      dockerfile: microservices/email/Dockerfile
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "8082:8082"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  # =========================================
  # FOLDER SERVICE  (HTTP :8083 | gRPC :50053)
  # =========================================
  folder-service:
    build:
      context: .
      dockerfile: microservices/folder/Dockerfile
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "8083:8083"
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
