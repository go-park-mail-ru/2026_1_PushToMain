services:

  # =========================================
  # POSTGRES
  # =========================================
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DBNAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================
  # USER SERVICE
  # =========================================
  user-service:
    build: ./
    env_file:
      - .env
    command:
      [
        "./smail",
        "--config",
        "./configs/user/config.yaml"
      ]
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # =========================================
  # EMAIL SERVICE
  # =========================================
  email-service:
    build: ./
    env_file:
      - .env
    command:
      [
        "./smail",
        "--config",
        "./configs/email/config.yaml"
      ]
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  # =========================================
  # FOLDER SERVICE
  # =========================================
  folder-service:
    build: ./
    env_file:
      - .env
    command:
      [
        "./smail",
        "--config",
        "./configs/folder/config.yaml"
      ]
    volumes:
      - ./configs:/app/configs
      - ./db/migrations:/app/db/migrations
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
    restart: unless-stopped

  # =========================================
  # MINIO
  # =========================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9090:9090"
      - "9000:9000"
    command: server --console-address ":9090" /data
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: