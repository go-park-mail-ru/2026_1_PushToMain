# dev config

port: 8082

jwt:
  secret: super-secret-key
  expire_hours: 24

cors:
  allowed_origins:
    - https://e-smail.ru

  allowed_methods:
    - POST
    - GET
    - OPTIONS
    - PUT
    - DELETE

  allowed_headers:
    - Content-Type
    - Authorization
    - X-CSRF-Token

logger:
  level: debug
  environment: development
  output_path: stdout
  error_output_path: stderr

postgres:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: smail_db
  sslmode: disable
  migrations_path: "file://db/migrations"

drafts:
  max_per_user: 100

grpc:
  email_port: "50052"

grpc_clients:
  user_service: "user-service:50051"